name: LauncherOnly

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      os:
        description: 'Target OS'
        required: true
        type: choice
        options:
          - android
          - linux
          - windows
        default: 'android'

jobs:
  build:
    name: Build (${{ inputs.os || 'android' }})
    runs-on: ${{ (inputs.os == 'windows') && 'windows-latest' || 'ubuntu-24.04' }}

    env:
      OS: ${{ inputs.os || 'android' }}

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java (Android only)
        if: env.OS == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Setup Android SDK (Android only)
        if: env.OS == 'android'
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        if: env.OS == 'android'
        run: echo y | sdkmanager "ndk;29.0.14206865"

      - name: Install Linux dependencies
        if: env.OS == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libtbb-dev libcurl4-openssl-dev patchelf

      - name: Bootstrap vcpkg
        if: env.OS == 'linux' || env.OS == 'android'
        run: |
          chmod +x ./thirdparty/vcpkg/bootstrap-vcpkg.sh
          ./thirdparty/vcpkg/bootstrap-vcpkg.sh

      - name: Setup Swap (Android only)
        if: env.OS == 'android'
        run: |
          sudo fallocate -l 8G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

      - name: Build Android
        if: env.OS == 'android'
        working-directory: android
        run: |
          chmod +x gradlew
          export ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/29.0.14206865
          export GRADLE_OPTS="-Xmx2048m -XX:+UseSerialGC -Dorg.gradle.daemon=false"
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Build Linux
        if: env.OS == 'linux'
        run: |
          mkdir -p build_linux && cd build_linux
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=../thirdparty/vcpkg/scripts/buildsystems/vcpkg.cmake
          cmake --build . --parallel $(nproc)

      - name: Build Windows
        if: env.OS == 'windows'
        run: |
          mkdir -p build_windows && cd build_windows
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=../thirdparty/vcpkg/scripts/buildsystems/vcpkg.cmake
          cmake --build . --config Release --parallel

      - name: Upload Android APK
        if: env.OS == 'android'
        uses: actions/upload-artifact@v4
        with:
          name: launcher-apk
          path: android/app/build/outputs/apk/release/*.apk

      - name: Upload Desktop Build
        if: env.OS == 'linux' || env.OS == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: launcher-${{ env.OS }}
          path: |
            build_*/**
            !build_*/**/*.o
            !build_*/**/*.a